<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CBSE History Museum - Human-Like Robot Walking Tour Guide</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif; }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            z-index: 100;
            pointer-events: none;
            border-left: 5px solid #ff9800;
            font-size: 14px;
            max-height: 30%;
            overflow-y: auto;
        }
        
        .info-panel h3 { margin: 0 0 8px 0; color: #ff9800; }
        .info-panel .cause-effect { color: #aaa; font-size: 12px; margin-top: 8px; border-top: 1px solid #333; padding-top: 6px; }
        
        .tour-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 100;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: monospace;
            pointer-events: auto;
        }
        
        .tour-controls button {
            background: #ff9800;
            border: none;
            color: #1a1a2e;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .tour-controls button:hover { background: #ffb74d; transform: scale(1.02); }
        .tour-controls button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .tour-controls .stop-btn { background: #f44336; color: white; }
        .tour-controls .pause-btn { background: #ffc107; }
        .tour-controls .resume-btn { background: #4caf50; color: white; }
        
        .seek-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 30px;
        }
        
        input[type="range"] { width: 200px; height: 4px; -webkit-appearance: none; background: #555; border-radius: 5px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ff9800; cursor: pointer; }
        
        .status-text { font-size: 12px; background: #333; padding: 4px 10px; border-radius: 20px; }
        .controls-hint { position: fixed; bottom: 90px; right: 20px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 20px; font-size: 11px; z-index: 100; pointer-events: none; }
        .title-overlay { position: fixed; top: 20px; left: 0; right: 0; text-align: center; background: rgba(0,0,0,0.7); color: white; padding: 10px; z-index: 100; font-size: 18px; font-weight: bold; letter-spacing: 2px; pointer-events: none; }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.8); padding: 20px 40px; border-radius: 10px; z-index: 200; font-size: 18px; text-align: center; }
        .location-tag { position: fixed; top: 80px; right: 20px; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 30px; color: #ff9800; font-weight: bold; font-size: 14px; z-index: 100; font-family: monospace; pointer-events: none; border-right: 3px solid #ff9800; }
        
        @media (max-width: 768px) {
            .tour-controls { padding: 8px 12px; gap: 6px; }
            .tour-controls button { padding: 5px 10px; font-size: 10px; }
            input[type="range"] { width: 120px; }
            .info-panel { font-size: 11px; padding: 10px 15px; }
            .title-overlay { font-size: 12px; top: 10px; }
            .location-tag { top: 70px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">🤖 Loading 3D Museum Tour - Human-Like Robot Guide...</div>
    <div class="title-overlay">🏛️ CBSE HISTORY MUSEUM | Robot Walks Like Human Tour Guide 🚶</div>
    <div class="location-tag" id="locationTag">📍 MAIN CORRIDOR</div>
    <div class="controls-hint">🖱️ Drag to look | Robot faces direction while walking 🚶</div>
    
    <div class="tour-controls" id="tourControls">
        <button id="prevBtn">⏮ PREVIOUS</button>
        <button id="nextBtn">NEXT ⏭</button>
        <button id="startTourBtn" class="start-btn">▶ START TOUR</button>
        <button id="pauseTourBtn" class="pause-btn">⏸ PAUSE</button>
        <button id="resumeTourBtn" class="resume-btn">▶ RESUME</button>
        <button id="stopTourBtn" class="stop-btn">⏹ STOP</button>
        <div class="seek-bar-container">
            <span>⏪</span>
            <input type="range" id="tourSeekBar" min="0" max="100" value="0" step="1">
            <span>⏩</span>
        </div>
        <div class="status-text" id="tourStatus">⚪ ROBOT: IDLE</div>
        <div class="status-text" id="tourCounter">0 of 0</div>
    </div>
    
    <div class="info-panel" id="infoPanel" style="display: none;">
        <h3 id="infoTitle">Select a Panel</h3>
        <p id="infoSubtitle">Robot faces panels while explaining, faces forward while walking</p>
        <div id="infoCauseEffect" class="cause-effect"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Waypoints with directions (facing angle while walking) ---
        const TIMELINE_API_URL = "https://staticapis.pragament.com/lms/cbse/topic-timeline.json";

        let waypoints = [];
        let panelsGroup = [];

        async function fetchTimelineData() {
            const res = await fetch(TIMELINE_API_URL);
            if (!res.ok) {
                throw new Error(`Failed to fetch timeline: ${res.status}`);
            }
            return await res.json();
        }

        function normalizeTimelineData(apiData) {
            // Check if data is nested under timeline.subtopics
            let items = [];
            if (apiData && apiData.timeline && Array.isArray(apiData.timeline.subtopics)) {
                items = apiData.timeline.subtopics;
            } else if (Array.isArray(apiData)) {
                items = apiData;
            } else {
                items = apiData.data || apiData.topics || [];
            }

            return items.map((item, index) => {
                const x = -28 + index * 8;
                const panelZ = index % 2 === 0 ? -5 : 5;
                const robotZ = index % 2 === 0 ? -2.5 : 2.5;

                // Format the subtitle with year_period if available
                let subtitleStr = item.subtopic_name || item.subtitle || "";
                if (item.year_period) {
                    subtitleStr += ` (${item.year_period})`;
                }

                return {
                    id: item.id || index + 1,
                    type: "corridor",
                    title: item.topic_name || item.title || item.name || `Topic ${index + 1}`,
                    subtitle: subtitleStr,
                    causeEffect: item.cause_effect || item.causeEffect || item.description || "",
                    pos: { x, y: 1.5, z: panelZ },
                    robotPos: { x, z: robotZ },
                    facingAngle: 0,
                    color: getColorByIndex(index),
                    grade: item.grade ? `Grade ${item.grade}` : "CBSE",
                    room: "Corridor",
                    raw: item
                };
            });
        }

        function getColorByIndex(index) {
            const colors = [
                0x4caf50, 0x8bc34a, 0xcddc39, 0xffeb3b, 0xff9800,
                0xff5722, 0x2196f3, 0x03a9f4, 0x9c27b0, 0xe91e63,
                0x3f51b5, 0x009688
            ];
            return colors[index % colors.length];
        }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-28, 3.5, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.8;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.target.set(0, 1.5, 0);
        
        // Loading control is handled in init()
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // Floor
        const floorGeometry = new THREE.PlaneGeometry(120, 40);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.4, metalness: 0.7 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Corridor path
        const corridorPoints = [];
        for (let x = -30; x <= 75; x += 2) corridorPoints.push(new THREE.Vector3(x, 0, 0));
        const corridorGeo = new THREE.BufferGeometry().setFromPoints(corridorPoints);
        const corridorMat = new THREE.LineBasicMaterial({ color: 0xffaa44 });
        const corridorLine = new THREE.Line(corridorGeo, corridorMat);
        scene.add(corridorLine);
        
        // Removed vestigial classroom meshes as they don't apply to the flat API timeline
        
        let gridHelper = new THREE.GridHelper(120, 30, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.1;
        scene.add(gridHelper);
        
        // --- Create Panels ---
        const panelMeshes = [];
        const panelLabels = [];

        function scaleSceneForData() {
            const step = 8;
            const corridorLength = waypoints.length * step + 60;
            const centerOffsetX = corridorLength / 2 - 30; // Shift the center to the right so it starts at -30

            // Update Floor
            floor.geometry.dispose();
            floor.geometry = new THREE.PlaneGeometry(corridorLength, 40);
            floor.position.x = centerOffsetX;

            // Update Grid
            if (gridHelper) {
                scene.remove(gridHelper);
            }
            gridHelper = new THREE.GridHelper(corridorLength, Math.floor(corridorLength / 4), 0x88aaff, 0x335588);
            gridHelper.position.y = -0.1;
            gridHelper.position.x = centerOffsetX;
            scene.add(gridHelper);

            // Update Corridor Line
            corridorLine.geometry.dispose();
            const corridorPoints = [];
            for (let x = -30; x <= corridorLength - 30; x += 2) {
                corridorPoints.push(new THREE.Vector3(x, 0, 0));
            }
            corridorLine.geometry = new THREE.BufferGeometry().setFromPoints(corridorPoints);
            
            // Tune fog
            scene.fog.density = 0.003;
        }

        function clearPanels() {
            panelMeshes.forEach(mesh => scene.remove(mesh));
            panelLabels.forEach(label => scene.remove(label));
            panelMeshes.length = 0;
            panelLabels.length = 0;
            panelsGroup.length = 0;
        }

        function createPanelsFromWaypoints() {
            clearPanels();

            waypoints.forEach(wp => {
                const geometry = new THREE.BoxGeometry(
                    wp.type === "classroom_detail" ? 2.5 : 2.8,
                    1.8,
                    0.2
                );

                const material = new THREE.MeshStandardMaterial({
                    color: wp.color,
                    emissive: wp.color,
                    emissiveIntensity: 0.15
                });

                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(wp.pos.x, wp.pos.y, wp.pos.z);
                cube.castShadow = true;
                cube.userData = { ...wp };
                scene.add(cube);
                panelMeshes.push(cube);

                const div = document.createElement("div");
                div.textContent = wp.title;
                div.style.backgroundColor = `rgba(${(wp.color >> 16) & 255}, ${(wp.color >> 8) & 255}, ${wp.color & 255}, 0.85)`;
                div.style.color = "white";
                div.style.padding = "4px 10px";
                div.style.borderRadius = "20px";
                div.style.fontSize = "12px";
                div.style.fontWeight = "bold";

                const label = new CSS2DObject(div);
                label.position.set(wp.pos.x, wp.pos.y + 1.2, wp.pos.z);
                scene.add(label);
                panelLabels.push(label);

                panelsGroup.push({
                    mesh: cube,
                    data: wp,
                    robotPos: wp.robotPos
                });
            });
        }
        
        // --- Create Robot with movable parts for human-like walking ---
        const robotGroup = new THREE.Group();
        robotGroup.position.set(-28, 0, -2.5);
        
        // Body
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.7 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.6), bodyMat);
        body.castShadow = true;
        body.position.y = 0.6;
        robotGroup.add(body);
        
        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffcc88 }));
        head.position.y = 1.2;
        robotGroup.add(head);
        
        // Eyes
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), eyeMat);
        leftEye.position.set(-0.18, 1.35, 0.5);
        robotGroup.add(leftEye);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), eyeMat);
        rightEye.position.set(0.18, 1.35, 0.5);
        robotGroup.add(rightEye);
        
        // Pupils
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 32, 32), pupilMat);
        leftPupil.position.set(-0.18, 1.33, 0.62);
        robotGroup.add(leftPupil);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 32, 32), pupilMat);
        rightPupil.position.set(0.18, 1.33, 0.62);
        robotGroup.add(rightPupil);
        
        // Antenna
        const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
        antenna.position.set(0, 1.65, 0);
        robotGroup.add(antenna);
        
        // LEGS (for walking animation)
        const legMat = new THREE.MeshStandardMaterial({ color: 0x44aaff });
        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.6, 8), legMat);
        leftLeg.position.set(-0.25, 0.3, 0);
        robotGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.6, 8), legMat);
        rightLeg.position.set(0.25, 0.3, 0);
        robotGroup.add(rightLeg);
        
        // ARMS (for pointing and swinging)
        const armMat = new THREE.MeshStandardMaterial({ color: 0x44aaff });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.7, 8), armMat);
        leftArm.position.set(-0.5, 0.9, 0);
        robotGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.7, 8), armMat);
        rightArm.position.set(0.5, 0.9, 0);
        robotGroup.add(rightArm);
        
        // Hand (pointing finger)
        const handMat = new THREE.MeshStandardMaterial({ color: 0xffcc88 });
        const leftHand = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 8), handMat);
        leftHand.position.set(-0.85, 1.05, 0.2);
        robotGroup.add(leftHand);
        
        scene.add(robotGroup);
        
        // Store parts for animation
        const robotParts = { leftLeg, rightLeg, leftArm, rightArm, leftHand };
        
        // --- Walking Animation (swings legs and arms like human) ---
        let walkCycle = 0;
        let isWalking = false;
        let currentTargetAngle = 0;
        let currentRobotAngle = 0;
        
        function updateWalkingAnimation(deltaTime) {
            if (isWalking) {
                walkCycle += deltaTime * 8;
                const swing = Math.sin(walkCycle) * 0.6;
                // Legs swing opposite directions
                robotParts.leftLeg.rotation.x = swing;
                robotParts.rightLeg.rotation.x = -swing;
                // Arms swing opposite to legs (natural walking motion)
                robotParts.leftArm.rotation.z = -swing * 0.8;
                robotParts.rightArm.rotation.z = swing * 0.8;
            } else {
                // Idle: slight bounce and reset positions
                const idleSwing = Math.sin(Date.now() * 0.005) * 0.1;
                robotParts.leftLeg.rotation.x = idleSwing;
                robotParts.rightLeg.rotation.x = -idleSwing;
                robotParts.leftArm.rotation.z = -idleSwing * 0.5;
                robotParts.rightArm.rotation.z = idleSwing * 0.5;
            }
            
            // Smoothly rotate robot to face direction
            if (Math.abs(currentRobotAngle - currentTargetAngle) > 0.01) {
                currentRobotAngle += (currentTargetAngle - currentRobotAngle) * 0.1;
                robotGroup.rotation.y = currentRobotAngle;
            }
        }
        
        // Function to make robot point at a panel (for explanation)
        let pointingTimeout = null;
        function pointAtPanel(panelIndex) {
            if (pointingTimeout) clearTimeout(pointingTimeout);
            
            // Stop walking motion, start pointing
            isWalking = false;
            robotParts.leftArm.rotation.z = 0.5;
            robotParts.leftArm.rotation.x = 0.3;
            robotParts.leftHand.rotation.x = 0.2;
            robotParts.rightArm.rotation.z = -0.2;
            
            // Reset after pointing
            pointingTimeout = setTimeout(() => {
                if (isWalking) return;
                robotParts.leftArm.rotation.z = 0;
                robotParts.leftArm.rotation.x = 0;
                robotParts.leftHand.rotation.x = 0;
                robotParts.rightArm.rotation.z = 0;
            }, 3000);
        }
        
        // --- Tour Logic ---
        let isAutoTourActive = false;
        let isPaused = false;
        let currentWaypointIndex = 0;
        let tourTimeout = null;
        let isRobotMoving = false;
        let perPanelStayDuration = 5000;
        let walkDuration = 2500;
        
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const startBtn = document.getElementById('startTourBtn');
        const pauseBtn = document.getElementById('pauseTourBtn');
        const resumeBtn = document.getElementById('resumeTourBtn');
        const stopBtn = document.getElementById('stopTourBtn');
        const seekBar = document.getElementById('tourSeekBar');
        const tourStatusSpan = document.getElementById('tourStatus');
        const tourCounterSpan = document.getElementById('tourCounter');
        const locationTag = document.getElementById('locationTag');
        
        function updateCounter() {
            if (waypoints.length > 0) {
                tourCounterSpan.innerHTML = `📍 ${currentWaypointIndex + 1} of ${waypoints.length}`;
            } else {
                tourCounterSpan.innerHTML = `📍 0 of 0`;
            }
        }
        
        function updatePrevNextButtons() {
            prevBtn.disabled = currentWaypointIndex <= 0;
            nextBtn.disabled = currentWaypointIndex >= waypoints.length - 1;
        }

        function goToWaypoint(index) {
            if (index < 0 || index >= waypoints.length) return;

            if (tourTimeout) clearTimeout(tourTimeout);
            isAutoTourActive = false;
            isPaused = false;

            currentWaypointIndex = index;
            updateCounter();
            seekBar.value = waypoints.length > 1
                ? (currentWaypointIndex / (waypoints.length - 1)) * 100
                : 0;
            const wp = waypoints[index];

            tourStatusSpan.innerHTML = `Moving to ${wp.title}`;
            moveRobotToWaypoint(index, () => {
                if (wp.type !== "corridor_exit" && wp.type !== "classroom_entry") {
                    showPanelInfo(wp);
                } else {
                    updateLocationTag(wp.room);
                    tourStatusSpan.innerHTML = `🤖 ${wp.type === "classroom_entry" ? "Entering classroom..." : "Returning to corridor..."}`;
                }
                updatePrevNextButtons();
            });
        }

        function updateLocationTag(room) {
            if (room === "Corridor") locationTag.innerHTML = "📍 MAIN CORRIDOR | 🚶 Robot faces forward";
            else if (room.includes("Classroom")) locationTag.innerHTML = `🏫 ${room} | 🚶 Robot turns to face panels`;
            else locationTag.innerHTML = `🚪 ${room}`;
        }
        
        function showPanelInfo(data) {
            const infoPanel = document.getElementById('infoPanel');

            document.getElementById('infoTitle').innerHTML =
                `${data.title || "Untitled"} <span style="font-size:12px">${data.grade || ""}</span>`;

            document.getElementById('infoSubtitle').innerHTML =
                data.subtitle || "Timeline event";

            document.getElementById('infoCauseEffect').innerHTML =
                `<strong>Details:</strong> ${data.causeEffect || "No description available."}`;

            infoPanel.style.display = 'block';

            clearTimeout(window.infoTimeout);
            window.infoTimeout = setTimeout(() => {
                infoPanel.style.display = 'none';
            }, 5000);

            updateLocationTag(data.room || "Corridor");
            
            // Make robot point at panel while explaining
            if (data.type !== "classroom_entry" && data.type !== "corridor_exit") {
                pointAtPanel(data.id);
            }
        }
        
        let currentMoveRAF = null;
        function moveRobotToWaypoint(index, onComplete) {
            if (currentMoveRAF) cancelAnimationFrame(currentMoveRAF);
            if (index >= waypoints.length) return;
            const wp = waypoints[index];
            const targetPos = new THREE.Vector3(wp.robotPos.x, 0, wp.robotPos.z);
            const startPos = robotGroup.position.clone();
            const startAngle = currentRobotAngle;
            const targetAngle = wp.facingAngle;
            const duration = (wp.type === "classroom_detail" || wp.type === "classroom_entry") ? walkDuration * 1.2 : walkDuration;
            const startTime = performance.now();
            isRobotMoving = true;
            isWalking = true;
            walkCycle = 0;
            
            function animateMove(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                
                // Move position
                robotGroup.position.lerpVectors(startPos, targetPos, ease);
                
                // Gradually rotate to target angle while walking (turns corners naturally)
                currentTargetAngle = startAngle + (targetAngle - startAngle) * ease;
                
                // Walking bob
                const bob = Math.sin(elapsed * 0.015) * 0.04;
                robotGroup.position.y = bob;
                
                if (t < 1) {
                    currentMoveRAF = requestAnimationFrame(animateMove);
                } else {
                    robotGroup.position.copy(targetPos);
                    robotGroup.position.y = 0;
                    currentTargetAngle = targetAngle;
                    currentRobotAngle = targetAngle;
                    robotGroup.rotation.y = targetAngle;
                    isRobotMoving = false;
                    isWalking = false;
                    currentMoveRAF = null;
                    
                    // Reset arm positions
                    robotParts.leftArm.rotation.z = 0;
                    robotParts.rightArm.rotation.z = 0;
                    
                    if (onComplete) onComplete();
                }
            }
            currentMoveRAF = requestAnimationFrame(animateMove);
        }
        
        function visitWaypoint(index) {
            if (!isAutoTourActive || isPaused) return;
            if (index >= waypoints.length) {
                stopAutoTour(true);
                tourStatusSpan.innerHTML = "✅ TOUR COMPLETED! Robot guided through all exhibits";
                return;
            }
            currentWaypointIndex = index;
            updateCounter();
            seekBar.value = waypoints.length > 1
                ? (currentWaypointIndex / (waypoints.length - 1)) * 100
                : 0;
            const wp = waypoints[index];
            tourStatusSpan.innerHTML = `🤖 Walking to: ${wp.title.substring(0, 35)}`;
            
            moveRobotToWaypoint(index, () => {
                if (wp.type !== "corridor_exit" && wp.type !== "classroom_entry") {
                    showPanelInfo(wp);
                } else {
                    updateLocationTag(wp.room);
                    tourStatusSpan.innerHTML = `🤖 ${wp.type === "classroom_entry" ? "Entering classroom..." : "Returning to corridor..."}`;
                }
                const stayTime = (wp.type === "corridor_exit" || wp.type === "classroom_entry") ? 2000 : perPanelStayDuration;
                tourTimeout = setTimeout(() => {
                    if (isAutoTourActive && !isPaused) visitWaypoint(index + 1);
                }, stayTime);
            });
        }
        
        function startAutoTour() {
            if (isAutoTourActive) stopAutoTour(false);
            isAutoTourActive = true;
            isPaused = false;
            currentWaypointIndex = 0;
            tourStatusSpan.innerHTML = "🤖 ROBOT: STARTING GUIDED TOUR";
            visitWaypoint(0);
        }
        
        function pauseAutoTour() {
            if (!isAutoTourActive || isPaused) return;
            isPaused = true;
            if (tourTimeout) clearTimeout(tourTimeout);
            isWalking = false;
            tourStatusSpan.innerHTML = "⏸ ROBOT: PAUSED";
        }
        
        function resumeAutoTour() {
            if (!isAutoTourActive || !isPaused) return;
            isPaused = false;
            tourStatusSpan.innerHTML = `🤖 ROBOT: RESUMING TOUR`;
            visitWaypoint(currentWaypointIndex);
        }
        
        function stopAutoTour(resetStatus = true) {
            isAutoTourActive = false;
            isPaused = false;
            isWalking = false;
            if (tourTimeout) clearTimeout(tourTimeout);
            if (resetStatus) tourStatusSpan.innerHTML = "⚪ ROBOT: IDLE";
        }
        
        function seekToPosition(value) {
            const percent = value / 100;
            const index = Math.min(
                waypoints.length - 1,
                Math.max(0, Math.floor(percent * waypoints.length))
            );
            if (index >= 0 && index < waypoints.length) {
                if (tourTimeout) clearTimeout(tourTimeout);
                currentWaypointIndex = index;
                updateCounter();
                updatePrevNextButtons();
                const wp = waypoints[index];
                tourStatusSpan.innerHTML = `Moving to ${wp.title}`;
                
                moveRobotToWaypoint(index, () => {
                    if (wp.type !== "corridor_exit" && wp.type !== "classroom_entry") {
                        showPanelInfo(wp);
                    } else {
                        updateLocationTag(wp.room);
                        tourStatusSpan.innerHTML = `🤖 ${wp.type === "classroom_entry" ? "Entering classroom..." : "Returning to corridor..."}`;
                    }
                    if (isAutoTourActive && !isPaused) {
                        tourTimeout = setTimeout(() => visitWaypoint(index + 1), perPanelStayDuration);
                    }
                });
            }
        }
        
        // Camera follow (third-person behind robot)
        function updateCameraFollow() {
            if (!isRobotMoving && !isAutoTourActive) return;
            const robotPos = robotGroup.position;
            const robotAngle = robotGroup.rotation.y;
            // Camera offset based on robot's facing direction
            const behindX = -Math.sin(robotAngle) * 5;
            const behindZ = -Math.cos(robotAngle) * 5;
            const targetCameraPos = new THREE.Vector3(
                robotPos.x + behindX,
                robotPos.y + 3.5,
                robotPos.z + behindZ
            );
            camera.position.lerp(targetCameraPos, 0.05);
            controls.target.lerp(robotPos, 0.05);
            controls.update();
        }
        
        // Animation loop for walking and camera
        let lastTime = performance.now();
        function animationLoop() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateWalkingAnimation(delta);
            updateCameraFollow();
            
            // Blinking eyes
            if (Math.random() < 0.005) {
                leftPupil.scale.set(0.1, 0.1, 0.1);
                rightPupil.scale.set(0.1, 0.1, 0.1);
                setTimeout(() => {
                    leftPupil.scale.set(1, 1, 1);
                    rightPupil.scale.set(1, 1, 1);
                }, 100);
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animationLoop);
        }
        async function init() {
            try {
                document.getElementById("loading").style.display = "block";

                const apiData = await fetchTimelineData();
                waypoints = normalizeTimelineData(apiData);

                scaleSceneForData();
                createPanelsFromWaypoints();

                if (waypoints.length > 0) {
                    const first = waypoints[0];
                    robotGroup.position.set(first.robotPos.x, 0, first.robotPos.z);
                    currentWaypointIndex = 0;
                }

                document.getElementById("loading").style.display = "none";
                updatePrevNextButtons();
                updateCounter();
                seekBar.value = 0;
                animationLoop();
            } catch (error) {
                console.error(error);
                document.getElementById("loading").innerHTML = "Failed to load timeline data";
            }
        }

        init();
        
        // Event listeners
        prevBtn.addEventListener("click", () => goToWaypoint(currentWaypointIndex - 1));
        nextBtn.addEventListener("click", () => goToWaypoint(currentWaypointIndex + 1));
        startBtn.addEventListener('click', startAutoTour);
        pauseBtn.addEventListener('click', pauseAutoTour);
        resumeBtn.addEventListener('click', resumeAutoTour);
        stopBtn.addEventListener('click', () => stopAutoTour(true));
        seekBar.addEventListener('input', (e) => seekToPosition(parseFloat(e.target.value)));
        
        // Click panels
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (event) => {
            if (event.target.closest('.tour-controls')) return;
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(panelsGroup.map(p => p.mesh));
            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                if (data) {
                    showPanelInfo(data);
                    if (!isAutoTourActive) {
                        const idx = waypoints.findIndex(w => w.id === data.id);
                        if (idx !== -1) goToWaypoint(idx);
                    }
                }
            }
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
