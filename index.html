<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>History Museum - Historical Timeline View</title>
    <link rel="stylesheet" href="timeline.css?v=6">
</head>
<body>
    <div class="mode-toggle-bar">
        <div class="logo">
            🏛️ HISTORY MUSEUM <span id="curriculumLabel">Historical Timeline</span>
        </div>
        <div class="mode-buttons">
            <a href="select.html" class="mode-btn" style="background: rgba(255,152,0,0.15); border-color: #ff9800;">
                🔄 <span id="changeCurriculumBtn">Change Board</span>
            </a>
            <a href="index.html" class="mode-btn active">📅 TIMELINE VIEW</a>
            <a href="admin.html" class="mode-btn">👨‍🏫 TEACHER PORTAL</a>
            <a href="3d.html" class="mode-btn">🎮 3D TOUR (ROBOT GUIDE)</a>
        </div>
    </div>

    <main id="timelineView" class="timeline-view">
        <div class="timeline-header">
            <h1>📅 <span>Historical Timeline</span> of Indian & World History</h1>
            <p class="subtitle" id="timelineSubtitle">CBSE Social Science | Grade 6-10 | Chronological Order</p>
        </div>

        <div class="timeline-controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search topics...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-grade="all">All Grades</button>
                <button class="filter-btn" data-grade="Grade 6">📘 Grade 6</button>
                <button class="filter-btn" data-grade="Grade 7">📙 Grade 7</button>
                <button class="filter-btn" data-grade="Grade 8">📕 Grade 8</button>
                <button class="filter-btn" data-grade="Grade 9">📗 Grade 9</button>
                <button class="filter-btn" data-grade="Grade 10">📓 Grade 10</button>
            </div>
            <button id="resetTimeline" class="nav-btn">🔄 Reset</button>
        </div>

        <!-- Compare Panel -->
        <div class="compare-panel" id="comparePanel">
            <div class="compare-panel-label">🔀 Compare Boards:</div>
            <div class="compare-toggles" id="compareToggles"></div>
        </div>

        <div class="timeline" id="timelineContainer"></div>
        <div class="scroll-indicator" id="scrollToTop">⬆</div>
    </main>



    <script src="timeline.js?v=7"></script>
    <script>
        // Update header with selected curriculum
        const currLabel = localStorage.getItem("curriculumLabel") || "CBSE";
        document.getElementById("curriculumLabel").textContent = currLabel;
        document.getElementById("timelineSubtitle").textContent = `${currLabel} Social Science | Grade 6-10 | Chronological Order`;
        document.title = `${currLabel} History Museum - Timeline`;
    </script>
</body>
</html>
