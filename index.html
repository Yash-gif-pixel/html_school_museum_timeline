<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CBSE History Museum - Historical Timeline View</title>
    <link rel="stylesheet" href="timeline.css">
</head>
<body>
    <div class="mode-toggle-bar">
        <div class="logo">🏛️ CBSE HISTORY MUSEUM <span>Historical Timeline</span></div>
        <div class="mode-buttons">
            <a href="index.html" class="mode-btn active">📅 TIMELINE VIEW</a>
            <a href="admin.html" class="mode-btn">👨‍🏫 TEACHER PORTAL</a>
            <a href="3d.html" class="mode-btn">🎮 3D TOUR (ROBOT GUIDE)</a>
        </div>
    </div>

    <main id="timelineView" class="timeline-view">
        <div class="timeline-header">
            <h1>📅 <span>Historical Timeline</span> of Indian & World History</h1>
            <p class="subtitle">CBSE Social Science | Grade 6-10 | Chronological Order</p>
        </div>

        <div class="timeline-controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search topics...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-grade="all">All Grades</button>
                <button class="filter-btn" data-grade="Grade 6">📘 Grade 6</button>
                <button class="filter-btn" data-grade="Grade 7">📙 Grade 7</button>
                <button class="filter-btn" data-grade="Grade 8">📕 Grade 8</button>
                <button class="filter-btn" data-grade="Grade 9">📗 Grade 9</button>
                <button class="filter-btn" data-grade="Grade 10">📓 Grade 10</button>
            </div>
            <button id="resetTimeline" class="nav-btn">🔄 Reset</button>
        </div>

        <div class="timeline" id="timelineContainer"></div>
        <div class="scroll-indicator" id="scrollToTop">⬆</div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalYear" class="modal-year"></div>
            <p id="modalSubtitle" class="modal-subtitle"></p>
            <p id="modalCauseEffect" class="modal-cause-effect"></p>
            <p id="modalLocation" class="modal-location"></p>
            <p id="modalGrade" class="modal-grade"></p>
        </div>
    </div>

    <script src="timeline.js"></script>
</body>
</html>
