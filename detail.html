<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | CBSE History Museum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .mode-toggle-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 1000;
            border-bottom: 2px solid #ff9800;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo span {
            color: #ff9800;
        }

        .mode-buttons {
            display: flex;
            gap: 12px;
        }

        .mode-btn {
            background: #333;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            background: #ffb74d;
            color: #1a1a2e;
        }

        .container {
            flex: 1;
            padding: 100px 20px 40px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .back-btn-container {
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 152, 0, 0.15);
            border: 1px solid #ff9800;
            color: #ff9800;
            padding: 10px 22px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #ff9800;
            color: #1a1a2e;
            transform: translateX(-3px);
        }

        .detail-card {
            background: rgba(18, 22, 35, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px var(--event-color);

            grid-template-columns: 1.2fr 1fr;
            min-height: 550px;
        }

        .detail-card.no-image {
            grid-template-columns: 1fr;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .detail-card {
                grid-template-columns: 1fr;
            }
        }

        .image-side {
            position: relative;
            min-height: 350px;
            overflow: hidden;
        }

        @keyframes kenburns {
            0% {
                transform: scale(1) translate(0, 0);
            }

            50% {
                transform: scale(1.12) translate(-2%, -1%);
            }

            100% {
                transform: scale(1) translate(0, 0);
            }
        }

        .event-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            animation: kenburns 20s infinite ease-in-out;
            transition: transform 0.8s ease;
        }

        .event-image.no-kenburns {
            animation: none;
        }

        .image-side:hover .event-image {
            transform: scale(1.18);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            pointer-events: none;
        }

        .ai-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(45deg, #9c27b0, #e91e63);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .content-side {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            .content-side {
                padding: 25px;
            }
        }

        .event-meta {
            margin-bottom: 25px;
        }

        .year-era-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .year-badge {
            background: #ff9800;
            color: #1a1a2e;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .era-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .event-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #ffe0b2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .event-subtitle {

        .event-details-body {

        .section-box {

<body>

    <div class="mode-toggle-bar">
        <div class="logo">🏛️ CBSE HISTORY MUSEUM <span id="detailCurriculumLabel">Event Explorer</span></div>
        <div class="mode-buttons">
            <a href="select.html" class="mode-btn"
                style="background: rgba(255,152,0,0.15); border: 1px solid #ff9800;">🔄 Change Board</a>
            <a href="index.html" class="mode-btn">📅 TIMELINE VIEW</a>
            <a href="admin.html" class="mode-btn">👨‍🏫 TEACHER PORTAL</a>
            <a href="3d.html" class="mode-btn">🎮 3D TOUR</a>
        </div>
    </div>

    <main class="container">
        <div class="back-btn-container">
            <a href="index.html" class="back-btn">← Back to Timeline</a>
        </div>

        <div id="mainContainer">
            <!-- Loading state -->
            <div class="loading-screen">
                <img src="images/loading.gif" alt="Loading..." class="loading-gif"
                    style="width: 50px; height: 50px; margin-bottom: 20px;">
                <p>Loading historical event details...</p>
            </div>
        </div>
    </main>

    <script>
        const urlParamsGlobal = new URLSearchParams(window.location.search);
        const boardParam = urlParamsGlobal.get('board');

        const ALL_BOARDS = {
            cbse: { label: "CBSE", url: "https://staticapis.pragament.com/lms/cbse/topic-timeline.json", subtopicsKey: "subtopics" },
            telangana: { label: "SCERT Telangana", url: "https://staticapis.pragament.com/lms/scert_telangana/topic-timeline.json", subtopicsKey: "topics" },
            ap: { label: "SCERT AP", url: "https://staticapis.pragament.com/lms/scert_ap/topic-timeline.json", subtopicsKey: "topics" }
        };

        const PRAGAMENT_URL = "https://staticapis.pragament.com/lms/cbse/topic-timeline.json";
        const IMAGE_OVERRIDES_URL = "/api/image-overrides";

        // Read selected curriculum from localStorage (set by select.html)
        let SELECTED_CURRICULUM = localStorage.getItem("selectedCurriculum") || "cbse";
        let CURRICULUM_URL = localStorage.getItem("curriculumUrl") || PRAGAMENT_URL;
        let CURRICULUM_LABEL = localStorage.getItem("curriculumLabel") || "CBSE";
        let CURRICULUM_SUBTOPICS_KEY = localStorage.getItem("curriculumSubtopicsKey") || "subtopics";

        if (boardParam && ALL_BOARDS[boardParam]) {
            SELECTED_CURRICULUM = boardParam;
            CURRICULUM_URL = ALL_BOARDS[boardParam].url;
            CURRICULUM_LABEL = ALL_BOARDS[boardParam].label;
            CURRICULUM_SUBTOPICS_KEY = ALL_BOARDS[boardParam].subtopicsKey;
        }

        // Update header with selected curriculum
        document.getElementById("detailCurriculumLabel").textContent = `${CURRICULUM_LABEL} - Event Explorer`;

        const ERA_COLORS = {
            "Prehistory": "#8bc34a", "Ancient": "#cddc39", "Ancient India": "#8bc34a",
            "Global Trade": "#ffeb3b", "Medieval India": "#ff9800", "Mughal Empire": "#9c27b0",
            "Colonial India": "#2196f3", "Social Reform": "#00bcd4",
            "Indian Nationalism": "#e91e63", "World History": "#3f51b5"
        };
        const GRADE_COLORS = {
            "Grade 6": "#4caf50", "Grade 7": "#ff9800", "Grade 8": "#2196f3",
            "Grade 9": "#3f51b5", "Grade 10": "#e91e63"
        };

        function processRawData(data, imageOverrides = {}) {
            const subtopics = data?.timeline?.[CURRICULUM_SUBTOPICS_KEY] || [];
            return subtopics.map((item, index) => {
                const eventId = index + 1;
                const subtopicName = item.subtopic_name || item.topic_name || "Untitled topic";
                const topicName = item.topic_name || "";
                const chapterName = item.chapter_name || "";
                const subtitle = [topicName, chapterName].filter(Boolean).join(" | ");
                let grade = String(item.grade || "").trim();
                if (grade && !grade.toLowerCase().startsWith("grade")) grade = `Grade ${grade}`;
                else if (!grade) grade = "Grade";
                const location = item.display_location || item.location || item.corridor_classroom_position || "Location not specified";
                const causeEffect = item.cause_effect || "Cause & effect details not available.";
                const color = ERA_COLORS[chapterName] || GRADE_COLORS[grade] || "#ff9800";
                const override = imageOverrides[eventId] || {};
                const imgSrc = override.image || item.image_url || item.image || item.gif_url || item.thumbnail_url || "";
                const isAi = override.is_ai_image ?? Boolean(imgSrc);
                return {
                    id: eventId, title: subtopicName, topic_name: topicName, subtitle,
                    year: item.year_period || "Period not specified",
                    era: item.era || chapterName || "Timeline",
                    cause_effect: causeEffect, location,
                    geo_location: item.location || "",
                    panel_position: item.corridor_classroom_position || "",
                    grade, color, image: imgSrc, is_ai_image: isAi,
                    event_type: item.event_type || "", theme: item.theme || "", icon: item.icon || "",
                    people_involved: item.people_involved || [], organizations: item.organizations || [],
                    cause: item.cause || "", what_happened: item.what_happened || "",
                    immediate_effect: item.immediate_effect || "", long_term_impact: item.long_term_impact || "",
                    keywords: item.keywords || [], vocabulary: item.vocabulary || [],
                    did_you_know: item.did_you_know || "", think_about_it: item.think_about_it || "",
                    quiz_question: item.quiz_question || "", quiz_answer: item.quiz_answer || "",
                    exam_importance: item.exam_importance || ""
                };
            });
        }

        function escapeHtml(value) {
            return String(value ?? "").replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#39;"
            }[char]));
        }

        async function initPage() {
            const mainContainer = document.getElementById("mainContainer");

            // Get event ID from URL query params
            const urlParams = new URLSearchParams(window.location.search);
            const idParam = urlParams.get('id') || urlParams.get('event');

            if (!idParam) {
                renderError("No Event Specified", "Please choose an event from the timeline first.");
                return;
            }

            const targetId = parseInt(idParam, 10);
            if (isNaN(targetId)) {
                renderError("Invalid Event ID", "The specified event ID is invalid.");
                return;
            }

            try {
                const [dataResponse, overridesResponse] = await Promise.all([
                    fetch(CURRICULUM_URL, { cache: "no-store" }),
                    fetch(IMAGE_OVERRIDES_URL, { cache: "no-store" }).catch(() => null)
                ]);

                if (!dataResponse.ok) {
                    throw new Error(`Failed to load data: ${dataResponse.status}`);
                }

                const rawData = await dataResponse.json();
                const imageOverrides = overridesResponse?.ok ? await overridesResponse.json() : {};
                const allTopics = processRawData(rawData, imageOverrides);
                const currentEventIndex = allTopics.findIndex(e => e.id === targetId);

                if (currentEventIndex === -1) {
                    renderError("Event Not Found", `Could not find historical event with ID ${targetId}.`);
                    return;
                }

                const event = allTopics[currentEventIndex];

                // Update Page Title
                document.title = `${event.year ? event.year + ' - ' : ''}${event.title} | CBSE History Museum`;

                // Determine Prev and Next event IDs
                const prevEvent = currentEventIndex > 0 ? allTopics[currentEventIndex - 1] : null;
                const nextEvent = currentEventIndex < allTopics.length - 1 ? allTopics[currentEventIndex + 1] : null;

                renderEvent(event, prevEvent, nextEvent);

            } catch (err) {
                console.error("Error loading event:", err);
                renderError("Load Failure", "Failed to retrieve the timeline content. Please check your internet connection.");
            }
        }

        function renderError(title, message) {
            const mainContainer = document.getElementById("mainContainer");
            mainContainer.innerHTML = `
                <div class="error-screen">
                    <h2>⚠️ ${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                    <a href="index.html" class="back-btn" style="border-radius: 12px;">Return to Timeline</a>
                </div>
            `;
        }

        function renderEvent(event, prevEvent, nextEvent) {
            const mainContainer = document.getElementById("mainContainer");

            // Format Cause & Effect / What Happened HTML
            let causeEffectHtml = "";
            if (event.cause || event.immediate_effect) {
                causeEffectHtml = `
                    <div class="badges-grid" style="margin-bottom: 20px;">
                        ${event.cause ? `
                        <div class="section-box" style="border-left-color: #ff9800; margin-bottom: 0;">
                            <h4>🔥 Cause</h4>
                            <p>${escapeHtml(event.cause)}</p>
                        </div>` : ""}
                        ${event.immediate_effect ? `
                        <div class="section-box" style="border-left-color: #4caf50; margin-bottom: 0;">
                            <h4>⚡ Effect / Consequence</h4>
                            <p>${escapeHtml(event.immediate_effect)}</p>
                        </div>` : ""}
                    </div>
                `;
            } else if (event.what_happened) {
                causeEffectHtml = `
                    <div class="section-box" style="border-left-color: ${event.color};">
                        <h4>📖 What Happened</h4>
                        <p>${escapeHtml(event.what_happened)}</p>
                    </div>
                `;
            } else if (event.cause_effect && event.cause_effect !== "Cause & effect details not available.") {
                // Fallback to old split
                const parts = event.cause_effect.split("Effect:");
                if (parts.length === 2) {
                    causeEffectHtml = `
                        <div class="badges-grid" style="margin-bottom: 20px;">
                            <div class="section-box" style="border-left-color: #ff9800; margin-bottom: 0;">
                                <h4>🔥 Cause</h4>
                                <p>${escapeHtml(parts[0].replace("Cause:", "").trim())}</p>
                            </div>
                            <div class="section-box" style="border-left-color: #4caf50; margin-bottom: 0;">
                                <h4>⚡ Effect / Consequence</h4>
                                <p>${escapeHtml(parts[1].trim())}</p>
                            </div>
                        </div>
                    `;
                } else {
                    causeEffectHtml = `
                        <div class="section-box" style="border-left-color: ${event.color};">
                            <h4>📖 Cause & Effect Detail</h4>
                            <p>${escapeHtml(event.cause_effect)}</p>
                        </div>
                    `;
                }
            } else {
                causeEffectHtml = `
                    <div class="section-box" style="border-left-color: ${event.color}; border-left-style: dashed;">
                        <h4 style="color: #90a4ae;">📖 Timeline Entry</h4>
                        <p style="color: #b0bec5; font-style: italic;">No specific cause & effect relationship is documented for this event.</p>
                    </div>
                `;
            }

            // Long term impact
            const impactHtml = event.long_term_impact ? `
                <div class="section-box" style="border-left-color: #2196f3;">
                    <h4>🌊 Long-term Impact</h4>
                    <p>${escapeHtml(event.long_term_impact)}</p>
                </div>
            ` : "";

            // Determine sequential rotation index
            let rotIndex = parseInt(localStorage.getItem('rotationIndex') || '0');
            localStorage.setItem('rotationIndex', (rotIndex + 1).toString());

            const getRotatedValue = (field) => {
                if (Array.isArray(field) && field.length > 0) {
                    return field[rotIndex % field.length];
                }
                return field;
            };

            const currentDidYouKnow = getRotatedValue(event.did_you_know);
            const currentThinkAboutIt = getRotatedValue(event.think_about_it);
            const currentQuizQuestion = getRotatedValue(event.quiz_question);
            const currentQuizAnswer = getRotatedValue(event.quiz_answer);

            // Did you know & Think about it
            let extraBlocksHtml = "";
            if (currentDidYouKnow) {
                extraBlocksHtml += `
                    <div class="did-you-know">
                        <h4>💡 Did You Know?</h4>
                        <p>${escapeHtml(currentDidYouKnow)}</p>
                    </div>
                `;
            }
            if (currentThinkAboutIt) {
                extraBlocksHtml += `
                    <div class="think-about-it">
                        <h4>🤔 Think About It</h4>
                        <p>${escapeHtml(currentThinkAboutIt)}</p>
                    </div>
                `;
            }

            // Quiz
            const quizHtml = currentQuizQuestion ? `
                <div class="quiz-container">
                    <div class="quiz-question">🎯 Quick Quiz: ${escapeHtml(currentQuizQuestion)}</div>
                    ${currentQuizAnswer
                    ? `<div class="quiz-answer-container" onclick="this.classList.toggle('revealed')">
                               <div class="quiz-answer">${escapeHtml(currentQuizAnswer)}</div>
                               <div class="quiz-overlay">Tap to reveal answer 👀</div>
                           </div>`
                    : ""}
                </div>
            ` : "";

            // Keywords
            const keywordsHtml = (event.keywords && event.keywords.length > 0) ? (() => {
                const tags = event.keywords.map(k => `<span class="keyword-tag">${escapeHtml(k)}</span>`).join("");
                return `<div class="keywords-section"><h4 style="color:#90a4ae;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🔑 Keywords</h4><div class="keywords-container">${tags}</div></div>`;
            })() : "";

            // Vocabulary
            const vocabHtml = (event.vocabulary && event.vocabulary.length > 0) ? (() => {
                const bodyContent = `<table class="vocab-table"><tbody>${event.vocabulary.map(v => `
                    <tr>
                        <td class="vocab-word">${escapeHtml(v.word || v.term || "")}</td>
                        <td class="vocab-def">${escapeHtml(v.definition || v.meaning || "")}</td>
                    </tr>`).join("")}</tbody></table>`;
                return `<div class="section-box" style="border-left-color: #673ab7; padding: 15px;">
                    <h4>📚 Key Vocabulary</h4>
                    ${bodyContent}
                </div>`;
            })() : "";

            const hasImage = !!event.image;
            const cardClass = hasImage ? "detail-card" : "detail-card no-image";
            const isGif = event.image && event.image.toLowerCase().endsWith('.gif');
            const imageHtml = hasImage ? `
                <div class="image-side">
                    <img class="event-image ${isGif ? 'no-kenburns' : ''}" src="${event.image}" alt="${escapeHtml(event.title)}">
                    <div class="image-overlay"></div>
                    ${event.icon ? `<div style="position: absolute; top:20px; right:20px; font-size:40px; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); padding:10px; border-radius:50%; box-shadow:0 4px 10px rgba(0,0,0,0.3); z-index:5;">${escapeHtml(event.icon)}</div>` : ""}
                </div>
            ` : "";

            mainContainer.innerHTML = `
                <div class="${cardClass}" style="--event-color: ${event.color};">
                    ${imageHtml}
                    
                    <div class="content-side">
                        <div class="event-meta">
                            <div class="year-era-row">
                                <span class="year-badge" style="background-color: ${event.color}; color: ${getContrastColor(event.color)};">📅 ${escapeHtml(event.year)}</span>
                                ${event.exam_importance ? `<span class="exam-badge">Exam: ${escapeHtml(event.exam_importance)}</span>` : ""}
                            </div>
                            <h2 class="event-title">${!hasImage && event.icon ? escapeHtml(event.icon) + ' ' : ''}${escapeHtml(event.title)}</h2>
                            <p class="event-subtitle">${escapeHtml(event.subtitle)}</p>
                        </div>
                        
                        <div class="event-details-body">
                            ${keywordsHtml}
                            ${event.what_happened ? `
                            <div class="section-box" style="border-left-color: ${event.color};">
                                <h4>📖 What Happened</h4>
                                <p style="font-size: 15px; line-height: 1.6; color: #eceff1;">${escapeHtml(event.what_happened)}</p>
                            </div>` : ""}
                            ${causeEffectHtml}
                            ${impactHtml}
                            ${vocabHtml}
                            ${extraBlocksHtml}
                            ${quizHtml}
                            
                            <div class="badges-grid">
                                <div class="badge-card">
                                    <span class="label">🎓 Grade Level</span>
                                    <span class="val" style="color: ${event.color};">${escapeHtml(event.grade)}</span>
                                </div>
                                <div class="badge-card">
                                    <span class="label">📍 Location</span>
                                    <span class="val">${escapeHtml(event.location)}</span>
                                </div>
                                ${event.people_involved && event.people_involved.length > 0 ? `
                                <div class="badge-card">
                                    <span class="label">👥 Key People</span>
                                    <span class="val">${escapeHtml(event.people_involved.join(", "))}</span>
                                </div>` : ""}
                                ${event.organizations && event.organizations.length > 0 ? `
                                <div class="badge-card">
                                    <span class="label">🏛️ Organizations</span>
                                    <span class="val">${escapeHtml(event.organizations.join(", "))}</span>
                                </div>` : ""}
                            </div>
                        </div>

                        <div class="page-navigation">
                            <a href="${prevEvent ? 'detail.html?board=' + SELECTED_CURRICULUM + '&id=' + prevEvent.id : '#'}" 
                               class="nav-link ${prevEvent ? '' : 'disabled'}" 
                               title="${prevEvent ? prevEvent.title : ''}">
                                ⏮ Previous
                            </a>
                            
                            <button class="share-btn" onclick="copyShareLink()">
                                🔗 Share
                            </button>
                            
                            <button class="qr-btn" onclick="showQrModal()">
                                📱 QR Code
                            </button>
                            
                            <a href="${nextEvent ? 'detail.html?board=' + SELECTED_CURRICULUM + '&id=' + nextEvent.id : '#'}" 
                               class="nav-link ${nextEvent ? '' : 'disabled'}" 
                               title="${nextEvent ? nextEvent.title : ''}">
                                Next ⏭
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function copyShareLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.share-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                btn.style.background = '#4caf50';
                btn.style.color = 'white';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '#ff9800';
                    btn.style.color = '#1a1a2e';
                }, 2000);
            }).catch(err => {
                console.error("Could not copy link:", err);
            });
        }

        // Helper to determine text contrast color for the year badge
        function getContrastColor(hexColor) {
            const hex = hexColor.replace('#', '');
            if (hex.length !== 6) return '#1a1a2e';

            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);

            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1a1a2e' : '#ffffff';
        }

        let qrCodeInstance = null;

        function showQrModal() {
            const overlay = document.getElementById("qrModal");
            overlay.classList.add("show");

            // Generate QR Code if not already initialized
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; // Clear any previous

            qrCodeInstance = new QRCode(qrContainer, {
                text: window.location.href,
                width: 180,
                height: 180,
                colorDark: "#1a1a2e",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function hideQrModal() {
            const overlay = document.getElementById("qrModal");
            overlay.classList.remove("show");
        }

        function closeQrModal(event) {
            if (event.target.id === "qrModal") {
                hideQrModal();
            }
        }

        function downloadQrCode() {
            const qrContainer = document.getElementById("qrcode");
            const canvas = qrContainer.querySelector("canvas");
            const img = qrContainer.querySelector("img");

            let dataUrl = "";
            if (canvas) {
                dataUrl = canvas.toDataURL("image/png");
            } else if (img && img.src) {
                dataUrl = img.src;
            }

            if (!dataUrl) {
                alert("Could not generate download link for QR Code.");
                return;
            }

            const link = document.createElement("a");
            link.href = dataUrl;

            const eventTitle = document.querySelector(".event-title")?.textContent || "event";
            const safeTitle = eventTitle.toLowerCase().replace(/[^a-z0-9]+/g, "_").slice(0, 30);
            link.download = `qrcode_${safeTitle}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function printQrCode() {
            const qrContainer = document.getElementById("qrcode");
            const canvas = qrContainer.querySelector("canvas");
            const img = qrContainer.querySelector("img");

            let dataUrl = "";
            if (canvas) {
                dataUrl = canvas.toDataURL("image/png");
            } else if (img && img.src) {
                dataUrl = img.src;
            }

            if (!dataUrl) {
                alert("Could not print QR Code.");
                return;
            }

            const eventTitle = document.querySelector(".event-title")?.textContent || "Historical Event";
            const eventSubtitle = document.querySelector(".event-subtitle")?.textContent || "";

            const printWindow = window.open("", "_blank", "width=600,height=600");
            printWindow.document.open();
            printWindow.document.write(`
                <html>
                <head>
                    <title>Print QR Code - ${eventTitle}</title>
                    <style>
                        body {
                            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                            text-align: center;
                            padding: 40px;
                            color: #1a1a2e;
                        }
                        .container {
                            max-width: 400px;
                            margin: 0 auto;
                            border: 2px dashed #ccc;
                            padding: 30px;
                            border-radius: 16px;
                        }
                        h2 {
                            margin-top: 0;
                            font-size: 22px;
                            color: #1a1a2e;
                        }
                        p {
                            font-size: 14px;
                            color: #555;
                            margin-bottom: 25px;
                        }
                        img {
                            width: 200px;
                            height: 200px;
                            margin-bottom: 20px;
                        }
                        .footer {
                            font-size: 11px;
                            color: #888;
                            margin-top: 30px;
                            border-top: 1px solid #eee;
                            padding-top: 15px;
                        }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <h2>🏛️ CBSE History Museum</h2>
                        <p><strong>${eventTitle}</strong><br><small>${eventSubtitle}</small></p>
                        <img src="${dataUrl}" alt="QR Code">
                        <div class="footer">
                            Scan to view this timeline entry online.<br>
                            CBSE School Museum Timeline Project
                        </div>
                    </div>
                    <script>
                        window.onload = function() {
                            window.print();
                            window.close();
                        };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        initPage();
    </script>

    <!-- QR Code Modal -->
    <div id="qrModal" class="modal-overlay" onclick="closeQrModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="hideQrModal()">&times;</span>
            <h3>📱 Scan QR Code</h3>
            <p>Scan this QR code to view this historical entry on your mobile device!</p>
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
            <div class="modal-actions">
                <button class="action-btn download-btn" onclick="downloadQrCode()">
                    📥 Download
                </button>
                <button class="action-btn print-btn" onclick="printQrCode()">
                    🖨️ Print
                </button>
            </div>
            <button class="modal-btn" onclick="hideQrModal()">Close</button>
        </div>
    </div>
</body>

</html>
